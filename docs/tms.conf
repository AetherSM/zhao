# ======================================================
# ========== 辅导机构管理系统 (TMS) - 网关配置 ==========
# ======================================================
# 说明：
# 1. 此文件为一个独立的 server 块，作为 TMS 项目的专属网关。
# 2. 它监听一个内部端口（如 8088），处理所有 TMS 相关的请求。
# 3. 您需要在主 Nginx 配置中将 /tms/ 的流量转发到此端口。

server {
    listen 8088;
    server_name localhost;

    # 1. TMS 后端 API 代理
    # 将所有 /tms-api/ 的请求转发到 8081 端口的后端服务
    location /tms-api/ {
        proxy_pass http://127.0.0.1:8081/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 2. TMS 前端静态文件
    # 当用户访问 /tms/ 路径时，指向前端文件
    location /tms/ {
        alias /www/tms-app/dist/;
        try_files $uri $uri/ /tms/index.html;
        index index.html;
    }
}
